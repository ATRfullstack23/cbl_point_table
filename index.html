<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Editable Points Table</title>

<style>

body{
font-family:Arial;
background:linear-gradient(120deg,#1e3c72,#2a5298);
padding:40px;
color:white;
}

.container{
max-width:900px;
margin:auto;
background:white;
color:black;
padding:20px;
border-radius:10px;
}

h2{
text-align:center;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#4facfe;
color:white;
}

button{
padding:6px 12px;
border:none;
background:#4facfe;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#007bff;
}

input{
width:70px;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h2>🏆 CBL Points Table</h2>

<table id="table">

<thead>
<tr>
<th>#</th>
<th>Team</th>
<th>MP</th>
<th>W</th>
<th>L</th>
<th>D</th>
<th>TP</th>
<th>Action</th>
</tr>
</thead>

<tbody>

<tr>
<td>1</td>
<td>Thunder Boys</td>
<td><input value="6"></td>
<td><input value="4"></td>
<td><input value="2"></td>
<td><input value="0"></td>
<td><input value="8"></td>
<td><button onclick="save()">Save</button></td>
</tr>

<tr>
<td>2</td>
<td>Smash Masters</td>
<td><input value="6"></td>
<td><input value="4"></td>
<td><input value="2"></td>
<td><input value="0"></td>
<td><input value="8"></td>
<td><button onclick="save()">Save</button></td>
</tr>

<tr>
<td>3</td>
<td>Smart Boys</td>
<td><input value="6"></td>
<td><input value="1"></td>
<td><input value="5"></td>
<td><input value="0"></td>
<td><input value="2"></td>
<td><button onclick="save()">Save</button></td>
</tr>

</tbody>

</table>

</div>

<script>

function save(){

alert("Table Updated!");

}

</script>

</body>
</html>
