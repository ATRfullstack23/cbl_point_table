<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CBL Premium Points Table</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
color:white;
}

/* Container */
.container{
width:100%;
max-width:1000px;
}

/* Title */
.title{
text-align:center;
font-size:36px;
font-weight:700;
margin-bottom:30px;
letter-spacing:1px;
}

/* Card */
.table-card{
backdrop-filter:blur(15px);
background:rgba(255,255,255,0.07);
border-radius:20px;
overflow-x:auto; /* SCROLL ENABLE */
box-shadow:0 10px 40px rgba(0,0,0,0.5);
border:1px solid rgba(255,255,255,0.1);
}

/* Table */
table{
width:100%;
min-width:600px; /* IMPORTANT FOR MOBILE */
border-collapse:collapse;
}

thead{
background:rgba(255,255,255,0.1);
}

th{
padding:18px;
font-size:13px;
text-transform:uppercase;
letter-spacing:1px;
opacity:0.8;
}

td{
padding:16px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,0.08);
}

/* Team Poster */
.team{
display:flex;
align-items:center;
gap:15px;
text-align:left;
}

.team-poster{
width:60px;
height:60px;
border-radius:12px;
overflow:hidden;
}

.team-poster img{
width:100%;
height:100%;
object-fit:cover;
}

/* Team name */
.team-name{
font-size:16px;
font-weight:600;
}

/* Rank */
.rank{
font-size:20px;
font-weight:bold;
}

/* Top Teams Glow */
.top1{
background:linear-gradient(90deg,#ffd70022,#ffffff05);
box-shadow:inset 0 0 10px #ffd70055;
}

.top2{
background:linear-gradient(90deg,#c0c0c022,#ffffff05);
box-shadow:inset 0 0 10px #c0c0c055;
}

.top3{
background:linear-gradient(90deg,#cd7f3222,#ffffff05);
box-shadow:inset 0 0 10px #cd7f3255;
}

/* Hover */
tbody tr{
transition:0.3s;
}

tbody tr:hover{
background:rgba(255,255,255,0.08);
transform:scale(1.01);
}

/* MOBILE RESPONSIVE */
@media(max-width:600px){

body{
padding:10px;
align-items:flex-start;
}

.title{
font-size:22px;
margin-bottom:15px;
}

th,td{
font-size:12px;
padding:8px;
}

.team{
gap:10px;
}

.team-poster{
width:40px;
height:40px;
border-radius:8px;
}

.team-name{
font-size:13px;
}

.rank{
font-size:16px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="title">🏆 CBL Premium Points Table</div>

<div class="table-card">

<table>

<thead>
<tr>
<th>#</th>
<th>Team</th>
<th>MP</th>
<th>W</th>
<th>L</th>
<th>D</th>
<th>TP</th>
</tr>
</thead>

<tbody>

<tr class="top1">
<td class="rank">🥇</td>
<td class="team">
<div class="team-poster">
<img src="smash_masters.jpeg" alt="Smash Masters">
</div>
<div class="team-name">Smash Masters</div>
</td>
<td>18</td>
<td>13</td>
<td>5</td>
<td>0</td>
<td><b>26</b></td>
</tr>

<tr class="top2">
<td class="rank">🥈</td>
<td class="team">
<div class="team-poster">
<img src="thunder_boys.jpeg" alt="Thunder Boys">
</div>
<div class="team-name">Thunder Boys</div>
</td>
<td>18</td>
<td>13</td>
<td>5</td>
<td>0</td>
<td><b>26</b></td>
</tr>

<tr class="top3">
<td class="rank">🥉</td>
<td class="team">
<div class="team-poster">
<img src="smart_boys.jpeg" alt="Smart Boys">
</div>
<div class="team-name">Smart Boys</div>
</td>
<td>18</td>
<td>1</td>
<td>17</td>
<td>0</td>
<td><b>2</b></td>
</tr>

</tbody>

</table>

</div>

</div>

</body>
</html>
