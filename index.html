<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CBL Points Table</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Segoe UI, sans-serif;
}

body{
background:linear-gradient(135deg,#1f4037,#99f2c8);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.container{
width:100%;
max-width:900px;
background:white;
border-radius:15px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.title{
text-align:center;
font-size:28px;
font-weight:bold;
margin-bottom:20px;
color:#333;
}

.points-table{
width:100%;
border-collapse:collapse;
overflow:hidden;
border-radius:10px;
}

.points-table thead{
background:#4facfe;
color:white;
}

.points-table th,
.points-table td{
padding:14px;
text-align:center;
}

.points-table th:nth-child(2),
.points-table td:nth-child(2){
text-align:left;
}

.points-table tbody tr{
transition:0.3s;
}

.points-table tbody tr:nth-child(odd){
background:#f3f7ff;
}

.points-table tbody tr:nth-child(even){
background:#e9f0ff;
}

.points-table tbody tr:hover{
background:#cfe1ff;
transform:scale(1.01);
}

.rank{
font-weight:bold;
color:#4facfe;
}

/* mobile responsive */

@media(max-width:600px){

.points-table th,
.points-table td{
padding:10px;
font-size:14px;
}

.title{
font-size:22px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="title">🏆 CBL Tournament Points Table</div>

<table class="points-table">

<thead>
<tr>
<th>#</th>
<th>Team Name</th>
<th>MP</th>
<th>W</th>
<th>L</th>
<th>D</th>
<th>TP</th>
</tr>
</thead>

<tbody>

<tr>
<td class="rank">1</td>
<td>Thunder Boys</td>
<td>6</td>
<td>4</td>
<td>2</td>
<td>0</td>
<td><b>8</b></td>
</tr>

<tr>
<td class="rank">2</td>
<td>Smash Masters</td>
<td>6</td>
<td>4</td>
<td>2</td>
<td>0</td>
<td><b>8</b></td>
</tr>

<tr>
<td class="rank">3</td>
<td>Smart Boys</td>
<td>6</td>
<td>1</td>
<td>5</td>
<td>0</td>
<td><b>2</b></td>
</tr>

</tbody>

</table>

</div>

</body>
</html>
