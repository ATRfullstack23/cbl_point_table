<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CBL Points Table</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:10px;
color:white;
}

/* Container */
.container{
width:100%;
}

/* Title */
.title{
text-align:center;
font-size:24px;
font-weight:700;
margin-bottom:15px;
}

/* Card */
.table-card{
background:rgba(255,255,255,0.08);
border-radius:14px;
overflow:hidden;
}

/* Table */
table{
width:100%;
border-collapse:collapse;
table-layout:fixed;
}

/* Header */
th{
font-size:11px;
padding:8px 4px;
text-transform:uppercase;
}

/* Data */
td{
font-size:11px;
padding:8px 4px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,0.08);
}

/* Team column */
.team{
display:flex;
align-items:center;
gap:6px;
text-align:left;
}

/* Poster */
.team-poster{
width:28px;
height:28px;
border-radius:6px;
overflow:hidden;
flex-shrink:0;
}

.team-poster img{
width:100%;
height:100%;
object-fit:cover;
}

/* Name */
.team-name{
font-size:12px;
white-space:normal; /* FULL NAME SHOW */
word-break:break-word;
}

/* Rank */
.rank{
font-size:14px;
}

/* Highlight */
.top1{background:rgba(255,215,0,0.15);}
.top2{background:rgba(192,192,192,0.15);}
.top3{background:rgba(205,127,50,0.15);}

</style>
</head>

<body>

<div class="container">

<div class="title">🏆 CBL Points Table</div>

<div class="table-card">

<table>

<thead>
<tr>
<th>#</th>
<th>Team</th>
<th>MP</th>
<th>W</th>
<th>L</th>
<th>TP</th>
</tr>
</thead>

<tbody>

<tr class="top1">
<td class="rank">🥇</td>
<td class="team">
<div class="team-poster">
<img src="smash_masters.jpeg">
</div>
<div class="team-name">Smash Masters</div>
</td>
<td>18</td>
<td>13</td>
<td>5</td>
<td><b>26</b></td>
</tr>

<tr class="top2">
<td class="rank">🥈</td>
<td class="team">
<div class="team-poster">
<img src="thunder_boys.jpeg">
</div>
<div class="team-name">Thunder Boys</div>
</td>
<td>18</td>
<td>13</td>
<td>5</td>
<td><b>26</b></td>
</tr>

<tr class="top3">
<td class="rank">🥉</td>
<td class="team">
<div class="team-poster">
<img src="smart_boys.jpeg">
</div>
<div class="team-name">Smart Boys</div>
</td>
<td>18</td>
<td>1</td>
<td>17</td>
<td><b>2</b></td>
</tr>

</tbody>

</table>

</div>

</div>

</body>
</html>
