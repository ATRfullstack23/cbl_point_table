<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CBL Tournament Points Table</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
color:white;
}

/* Container */
.container{
width:100%;
max-width:900px;
}

/* Title */
.title{
text-align:center;
font-size:32px;
font-weight:700;
margin-bottom:25px;
letter-spacing:1px;
}

/* Glass Card */
.table-card{
backdrop-filter:blur(12px);
background:rgba(255,255,255,0.08);
border-radius:16px;
overflow:hidden;
box-shadow:0 8px 25px rgba(0,0,0,0.4);
border:1px solid rgba(255,255,255,0.1);
}

/* Table */
table{
width:100%;
border-collapse:collapse;
color:white;
}

thead{
background:rgba(255,255,255,0.1);
}

th{
padding:16px;
font-size:14px;
text-transform:uppercase;
letter-spacing:1px;
}

td{
padding:14px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,0.08);
}

/* Team Column */
.team{
display:flex;
align-items:center;
gap:12px;
text-align:left;
font-weight:600;
}

.team img{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
border:2px solid white;
}

/* Row Hover */
tbody tr{
transition:0.3s;
}

tbody tr:hover{
background:rgba(255,255,255,0.08);
transform:scale(1.01);
}

/* Rank Styling */
.rank{
font-weight:bold;
font-size:18px;
}

/* Top 3 Highlight */
.top1{
background:linear-gradient(90deg,#ffd70033,#ffffff10);
}

.top2{
background:linear-gradient(90deg,#c0c0c033,#ffffff10);
}

.top3{
background:linear-gradient(90deg,#cd7f3233,#ffffff10);
}

/* Medal */
.medal{
font-size:18px;
}

/* Responsive */
@media(max-width:600px){

.title{
font-size:24px;
}

th,td{
font-size:13px;
padding:10px;
}

.team img{
width:30px;
height:30px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="title">🏆 CBL Tournament Points Table</div>

<div class="table-card">

<table>

<thead>
<tr>
<th>#</th>
<th>Team</th>
<th>MP</th>
<th>W</th>
<th>L</th>
<th>D</th>
<th>TP</th>
</tr>
</thead>

<tbody>

<tr class="top1">
<td class="rank"><span class="medal">🥇</span></td>
<td class="team">
<img src="https://via.placeholder.com/40" alt="">
Thunder Boys
</td>
<td>12</td>
<td>9</td>
<td>3</td>
<td>0</td>
<td><b>18</b></td>
</tr>

<tr class="top2">
<td class="rank"><span class="medal">🥈</span></td>
<td class="team">
<img src="https://via.placeholder.com/40" alt="">
Smash Masters
</td>
<td>12</td>
<td>8</td>
<td>4</td>
<td>0</td>
<td><b>16</b></td>
</tr>

<tr class="top3">
<td class="rank"><span class="medal">🥉</span></td>
<td class="team">
<img src="https://via.placeholder.com/40" alt="">
Smart Boys
</td>
<td>12</td>
<td>1</td>
<td>11</td>
<td>0</td>
<td><b>2</b></td>
</tr>

</tbody>

</table>

</div>

</div>

</body>
</html>
